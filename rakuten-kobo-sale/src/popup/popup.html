<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kobo Sale Exporter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="rkse-popup">
      <h1>Kobo Sale Exporter</h1>

      <label>
        <span>クリック後の待機秒数</span>
        <input type="number" name="delaySeconds" min="1" max="30" value="5">
      </label>

      <label>
        <span>最大クリック回数</span>
        <input type="number" name="maxClicks" min="1" max="1000" value="300">
      </label>

      <button type="button" id="startButton">展開してCSV保存</button>
      <button type="button" id="exportButton">現在表示分をCSV保存</button>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
