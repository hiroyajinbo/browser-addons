<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fastmail Masked Email 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <header class="hero">
      <div>
        <h1>Fastmail Masked Email 設定</h1>
        <p class="lead">API tokenと接続状態を設定します。</p>
      </div>
    </header>

    <section class="panel">
      <h2>接続</h2>
      <label class="field">
        <span>Fastmail API token</span>
        <input id="token" type="password" autocomplete="off" spellcheck="false" placeholder="Masked Email権限を持つAPI token">
      </label>
      <p class="hint">Masked Emailの作成には、Masked Email権限を持つFastmail API tokenが必要です。必要以上の権限は付けないことを推奨します。</p>
      <div class="row">
        <button id="save-token" type="button" class="primary">保存</button>
        <button id="diagnose" type="button">接続テスト</button>
      </div>
      <p id="status" class="status" role="status" aria-live="polite">読み込み中...</p>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
