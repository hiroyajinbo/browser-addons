<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fastmail Masked Email</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div>
      <h1>Fastmail Masked Email</h1>
      <p id="status">読み込み中...</p>
    </div>
    <button id="options" type="button" title="設定">⚙</button>
  </header>

  <section id="setup" class="panel hidden">
    <h2>初期セットアップ</h2>
    <p>Fastmail API tokenを入力して、Masked Emailの作成を開始します。</p>
    <ol class="setup-steps">
      <li>Fastmailの設定でAPI tokenを作成します。</li>
      <li>Masked Email権限を持つtokenを入力します。</li>
      <li>保存後、接続と権限を自動で確認します。</li>
    </ol>
    <label class="field">
      <span>Fastmail API token</span>
      <input id="setup-token" type="password" autocomplete="off" spellcheck="false" placeholder="API token">
    </label>
    <div class="row">
      <button id="save-setup-token" type="button">保存して開始</button>
      <button id="open-options-setup" type="button">詳細設定を開く</button>
    </div>
  </section>

  <section id="creator" class="panel hidden">
    <label class="field">
      <span>用途名</span>
      <input id="description" type="text" placeholder="例: example.com 登録用">
    </label>
    <label class="field">
      <span>サイトURL</span>
      <input id="url" type="url" placeholder="https://example.com/">
    </label>
    <label class="field">
      <span>ドメイン</span>
      <input id="domain" type="text" placeholder="example.com">
    </label>
    <button id="create" type="button">Masked Emailを作成してコピー</button>
  </section>

  <section id="result" class="panel result hidden">
    <h2>作成しました</h2>
    <div id="created-email" class="created-email"></div>
    <button id="copy-created" type="button">再コピー</button>
  </section>

  <section id="history-panel" class="panel hidden">
    <h2>最近作成したアドレス</h2>
    <p id="history-summary" class="history-summary"></p>
    <div id="history" class="history"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
